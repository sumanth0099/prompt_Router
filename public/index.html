<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prompt Router</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #f5f4f0;
      --surface:  #ffffff;
      --border:   #e2e0d9;
      --text:     #1a1917;
      --muted:    #8c8880;
      --accent:   #1a1917;

      --code:    #16a34a;
      --data:    #d97706;
      --writing: #7c3aed;
      --career:  #0369a1;
      --unclear: #78716c;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      max-width: 720px;
      margin: 0 auto;
    }

    /* ── Header ─────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 500;
      font-size: 15px;
    }

    .logo-dot {
      width: 8px; height: 8px;
      background: var(--accent);
      border-radius: 50%;
    }

    .stats {
      display: flex;
      gap: 14px;
    }

    .stat {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: var(--muted);
    }

    .stat-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
    }

    .stat-count { font-family: 'DM Mono', monospace; font-size: 11px; }

    /* ── Messages ───────────────────────────────────────── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 32px 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* Empty */
    .empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      text-align: center;
      color: var(--muted);
    }

    .empty h2 { font-size: 20px; font-weight: 400; color: var(--text); }
    .empty p  { font-size: 14px; line-height: 1.6; max-width: 320px; }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    .chip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 7px 14px;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      color: var(--text);
      transition: border-color .15s, background .15s;
    }

    .chip:hover { border-color: var(--accent); background: var(--accent); color: #fff; }

    /* Messages */
    .msg { display: flex; flex-direction: column; gap: 6px; }
    .msg.user  { align-items: flex-end; }
    .msg.assistant { align-items: flex-start; }

    .bubble {
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.65;
      max-width: 85%;
    }

    .msg.user .bubble {
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg.assistant .bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    /* Code inside bubbles */
    .bubble pre {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      overflow-x: auto;
      margin: 10px 0;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      line-height: 1.5;
    }

    .bubble code:not(pre code) {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      background: var(--bg);
      border-radius: 4px;
      padding: 1px 5px;
    }

    /* Intent pill */
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: .02em;
    }

    .pill.code    { background: #dcfce7; color: var(--code);    }
    .pill.data    { background: #fef3c7; color: var(--data);    }
    .pill.writing { background: #ede9fe; color: var(--writing); }
    .pill.career  { background: #e0f2fe; color: var(--career);  }
    .pill.unclear { background: #f5f5f4; color: var(--unclear); }

    .msg-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 2px;
    }

    .conf {
      font-size: 11px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
    }

    /* Typing */
    .typing {
      display: flex;
      gap: 4px;
      padding: 14px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      width: fit-content;
    }

    .typing span {
      width: 6px; height: 6px;
      background: var(--muted);
      border-radius: 50%;
      animation: bounce 1s infinite;
    }

    .typing span:nth-child(2) { animation-delay: .15s; }
    .typing span:nth-child(3) { animation-delay: .30s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: .5; }
      30%           { transform: translateY(-5px); opacity: 1; }
    }

    /* ── Input ──────────────────────────────────────────── */
    .input-area {
      padding: 16px 24px 20px;
      background: var(--surface);
      border-top: 1px solid var(--border);
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px 12px;
      transition: border-color .2s;
    }

    .input-row:focus-within { border-color: var(--accent); }

    textarea {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      resize: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--text);
      line-height: 1.5;
      max-height: 140px;
      min-height: 22px;
    }

    textarea::placeholder { color: var(--muted); }

    .send {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      width: 34px; height: 34px;
      cursor: pointer;
      display: grid;
      place-items: center;
      flex-shrink: 0;
      transition: opacity .15s;
    }

    .send:hover   { opacity: .75; }
    .send:disabled { opacity: .25; cursor: not-allowed; }
    .send svg { width: 15px; height: 15px; fill: #fff; }

    .input-hint {
      font-size: 11px;
      color: var(--muted);
      margin-top: 8px;
      padding: 0 2px;
    }

    .input-hint code {
      font-family: 'DM Mono', monospace;
      background: var(--border);
      padding: 1px 4px;
      border-radius: 3px;
      font-size: 10px;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    Prompt Router
  </div>
  <div class="stats">
    <div class="stat">
      <div class="stat-dot" style="background:var(--code)"></div>
      Code <span class="stat-count" id="s-code">0</span>
    </div>
    <div class="stat">
      <div class="stat-dot" style="background:var(--data)"></div>
      Data <span class="stat-count" id="s-data">0</span>
    </div>
    <div class="stat">
      <div class="stat-dot" style="background:var(--writing)"></div>
      Writing <span class="stat-count" id="s-writing">0</span>
    </div>
    <div class="stat">
      <div class="stat-dot" style="background:var(--career)"></div>
      Career <span class="stat-count" id="s-career">0</span>
    </div>
  </div>
</header>

<div class="messages" id="messages">
  <div class="empty" id="empty">
    <h2>What do you need help with?</h2>
    <p>Your message is automatically routed to the right expert — code, data, writing, or career.</p>
    <div class="chips">
      <button class="chip" onclick="useChip(this)">Sort a list in Python</button>
      <button class="chip" onclick="useChip(this)">This paragraph sounds awkward</button>
      <button class="chip" onclick="useChip(this)">Average of 12, 45, 23, 67</button>
      <button class="chip" onclick="useChip(this)">Interview tips</button>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-row">
    <textarea
      id="input"
      placeholder="Ask anything…"
      rows="1"
      onkeydown="handleKey(event)"
      oninput="resize(this)"
    ></textarea>
    <button class="send" id="send-btn" onclick="send()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="input-hint">
    Enter to send · Shift+Enter for new line · Override: <code>@code</code> <code>@data</code> <code>@writing</code> <code>@career</code>
  </div>
</div>

<script>
  const LABELS = {
    code:    { emoji: '💻', label: 'Code' },
    data:    { emoji: '📊', label: 'Data' },
    writing: { emoji: '✍️', label: 'Writing' },
    career:  { emoji: '💼', label: 'Career' },
    unclear: { emoji: '🤔', label: 'Unclear' },
  };

  const $ = id => document.getElementById(id);
  let chatHistory = [];
  let busy = false;
  const counts = { code: 0, data: 0, writing: 0, career: 0, unclear: 0 };

  function resize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 140) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  }

  function useChip(btn) {
    $('input').value = btn.textContent;
    resize($('input'));
    $('input').focus();
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function md(text) {
    text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, l, c) =>
      `<pre><code>${esc(c.trim())}</code></pre>`);
    text = text.replace(/`([^`]+)`/g, (_, c) => `<code>${esc(c)}</code>`);
    text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    text = text.replace(/\n/g, '<br>');
    return text;
  }

  function scrollEnd() {
    const m = $('messages');
    m.scrollTop = m.scrollHeight;
  }

  function removeEmpty() {
    const e = $('empty');
    if (e) e.remove();
  }

  function addUser(text) {
    removeEmpty();
    const d = document.createElement('div');
    d.className = 'msg user';
    d.innerHTML = `<div class="bubble">${esc(text)}</div>`;
    $('messages').appendChild(d);
    scrollEnd();
  }

  function addTyping() {
    removeEmpty();
    const d = document.createElement('div');
    d.className = 'msg assistant';
    d.id = 'typing';
    d.innerHTML = `<div class="typing"><span></span><span></span><span></span></div>`;
    $('messages').appendChild(d);
    scrollEnd();
    return d;
  }

  function removeTyping() { const t = $('typing'); if (t) t.remove(); }

  function addAssistant(text, intent, confidence) {
    const m = LABELS[intent] ?? LABELS.unclear;
    const pct = Math.round(confidence * 100);
    const d = document.createElement('div');
    d.className = 'msg assistant';
    d.innerHTML = `
      <div class="msg-meta">
        <span class="pill ${intent}">${m.emoji} ${m.label}</span>
        <span class="conf">${pct}%</span>
      </div>
      <div class="bubble">${md(text)}</div>`;
    $('messages').appendChild(d);
    scrollEnd();

    // Update header stat
    counts[intent] = (counts[intent] || 0) + 1;
    const el = $(`s-${intent}`);
    if (el) el.textContent = counts[intent];
  }

  async function send() {
    if (busy) return;
    const input = $('input');
    const text = input.value.trim();
    if (!text) return;

    busy = true;
    $('send-btn').disabled = true;
    input.value = '';
    input.style.height = 'auto';

    addUser(text);
    addTyping();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, history: chatHistory }),
      });

      const data = await res.json();
      removeTyping();

      if (!res.ok) {
        addAssistant(`⚠️ ${data.error ?? 'Something went wrong.'}`, 'unclear', 0);
        return;
      }

      addAssistant(data.response, data.intent, data.confidence);

      chatHistory.push({ role: 'user', content: text });
      chatHistory.push({ role: 'assistant', content: data.response });
      if (chatHistory.length > 20) chatHistory = chatHistory.slice(-20);

    } catch {
      removeTyping();
      addAssistant('⚠️ Network error — is the server running?', 'unclear', 0);
    } finally {
      busy = false;
      $('send-btn').disabled = false;
      input.focus();
    }
  }
</script>
</body>
</html>
