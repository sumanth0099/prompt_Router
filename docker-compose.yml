version: "3.9"
services:
  prompt-router:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prompt-router
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - GROQ_API_KEY=${GROQ_API_KEY}
      - CONFIDENCE_THRESHOLD=${CONFIDENCE_THRESHOLD:-0.7}
    volumes:
      - ./route_log.jsonl:/app/route_log.jsonl
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/logs"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
